name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Prepare release asset
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/DevSettings-debug.apk

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/DevSettings-debug.apk \
            --title "$GITHUB_REF_NAME" \
            --notes "Instale o APK e depois conceda WRITE_SECURE_SETTINGS via ADB/PowerShell: adb shell pm grant com.gguilhem.devsettings android.permission.WRITE_SECURE_SETTINGS"
